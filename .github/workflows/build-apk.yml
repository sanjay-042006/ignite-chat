name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm install

      - name: Force Install Capacitor CLI
        working-directory: frontend
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Ensure Capacitor Config Exists
        working-directory: frontend
        run: |
          if [ ! -f "capacitor.config.ts" ] && [ ! -f "capacitor.config.json" ]; then
            npx cap init IgniteChat io.ignitechat.app --web-dir dist
          fi

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Add Capacitor Android Platform
        working-directory: frontend
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            npx cap sync android
          fi

      - name: Make Gradle Wrapper Executable
        run: chmod +x frontend/android/gradlew

      - name: Build App (APK)
        working-directory: frontend/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IgniteChat-APK
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
