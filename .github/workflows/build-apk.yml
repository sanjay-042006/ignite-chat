name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm install

      - name: Force Install Capacitor CLI
        working-directory: frontend
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Ensure Capacitor Config Exists
        working-directory: frontend
        run: |
          if [ ! -f "capacitor.config.ts" ] && [ ! -f "capacitor.config.json" ]; then
            npx cap init IgniteChat io.ignitechat.app --web-dir dist
          fi

      - name: Build Frontend
        working-directory: frontend
        run: |
          echo "VITE_API_URL=https://api.ignite-chat-freex.dns.army/api" > .env.production
          echo "VITE_BASE_URL=https://api.ignite-chat-freex.dns.army" >> .env.production
          npm run build

      - name: Add Capacitor Android Platform
        working-directory: frontend
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            npx cap sync android
          fi

      - name: Patch Android for Network Access
        working-directory: frontend/android
        run: |
          # 1. Create network_security_config.xml to allow connections to our backend
          mkdir -p app/src/main/res/xml
          cat > app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="true">
                  <trust-anchors>
                      <certificates src="system" />
                  </trust-anchors>
              </base-config>
              <domain-config cleartextTrafficPermitted="true">
                  <domain includeSubdomains="true">api.ignite-chat-freex.dns.army</domain>
                  <domain includeSubdomains="true">localhost</domain>
              </domain-config>
          </network-security-config>
          EOF

          # 2. Add networkSecurityConfig to AndroidManifest.xml if not already present
          if ! grep -q "networkSecurityConfig" app/src/main/AndroidManifest.xml; then
            sed -i 's|android:theme="@style/AppTheme"|android:theme="@style/AppTheme"\n        android:networkSecurityConfig="@xml/network_security_config"|' app/src/main/AndroidManifest.xml
          fi

          echo "--- AndroidManifest.xml ---"
          cat app/src/main/AndroidManifest.xml
          echo ""
          echo "--- network_security_config.xml ---"
          cat app/src/main/res/xml/network_security_config.xml

      - name: Make Gradle Wrapper Executable
        run: chmod +x frontend/android/gradlew

      - name: Build App (Release APK)
        working-directory: frontend/android
        run: ./gradlew assembleRelease

      - name: Sign APK for Distribution
        working-directory: frontend/android
        run: |
          # 1. Generate a production signing key
          keytool -genkey -v -keystore my-release-key.keystore -alias alias_name -keyalg RSA -keysize 2048 -validity 10000 -storepass password123 -keypass password123 -dname "CN=IgniteChat,O=IgniteChat,C=US"
          
          # 2. Find Android Build Tools
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -n 1)
          
          # 3. Zipalign the APK (Required for Android)
          $BUILD_TOOLS_DIR/zipalign -v 4 app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/app-release-aligned.apk
          
          # 4. Cryptographically Sign the APK using v2 signatures
          $BUILD_TOOLS_DIR/apksigner sign --ks my-release-key.keystore --ks-pass pass:password123 --out app/build/outputs/apk/release/IgniteChat-Ready.apk app/build/outputs/apk/release/app-release-aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: IgniteChat-APK
          path: frontend/android/app/build/outputs/apk/release/IgniteChat-Ready.apk
